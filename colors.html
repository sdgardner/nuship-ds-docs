<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color — nuShip Design System</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="nav-scroll.js" defer></script>
  <style>
    /* ─── Page header ───────────────────────────────────────── */
    .col-page { padding: 56px 40px 96px; max-width: 1200px; margin: 0 auto; }
    @media (max-width: 720px) { .col-page { padding: 40px 20px 72px; } }
    .col-head { display: flex; flex-direction: column; gap: 8px; margin-bottom: 32px; }
    .col-title { font-size: 32px; line-height: 38px; font-weight: 700; color: var(--text-primary); margin: 0; }
    .col-sub { font-size: 14px; line-height: 19px; color: var(--text-secondary); margin: 0; }

    /* ─── Toolbar (search + count + theme preview) ────────────────
       Sticky — but anchored with a comfortable offset below the topnav
       so it never touches the page's top edge (IBM Carbon pattern).
       When it "pops out" of the page flow we swap to surface-layer-03
       so it reads as a floating utility row, not a junior panel.
       ─────────────────────────────────────────────────────────────── */
    .col-sentinel { height: 1px; margin-top: -1px; }

    .col-toolbar {
      display: flex; align-items: center; gap: 24px;
      flex-wrap: wrap;
      padding: 12px 0;
      margin-bottom: 28px;
      position: sticky;
      top: 80px;
      z-index: 8;
      background: transparent;
      transition: background 180ms, box-shadow 180ms, padding 180ms, margin 180ms, border-radius 180ms;
    }
    .col-toolbar.is-stuck {
      padding: 14px 20px;
      max-width: 720px;
      margin-left: auto;
      margin-right: auto;
      background: var(--surface-layer03);
      border: 1px solid var(--border-soft);
      border-radius: 12px;
      box-shadow: 0 10px 28px -14px rgba(15, 23, 42, 0.18);
    }
    [data-theme="dark"] .col-toolbar.is-stuck {
      box-shadow: 0 10px 28px -14px rgba(0, 0, 0, 0.6);
    }

    /* Skid Search field — true .sr-field spec: 48px, surface-field,
       1px border (darkens on hover), 4px radius, 1px focus ring + 4px glow. */
    .col-search {
      display: flex; align-items: center; gap: 8px;
      height: 48px; padding: 0 12px;
      background: var(--surface-field);
      border: 1px solid var(--border);
      border-radius: 4px;
      flex: 1; min-width: 240px; max-width: 420px;
      box-sizing: border-box;
      transition: border-color 120ms, box-shadow 120ms;
    }
    .col-search:hover { border-color: var(--text-secondary); }
    .col-search:focus-within {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 4px rgba(90, 191, 224, 0.35);
    }
    [data-theme="dark"] .col-search:focus-within {
      box-shadow: 0 0 0 4px rgba(0, 131, 187, 0.35);
    }
    .col-search-icon {
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    .col-search-icon svg { width: 20px; height: 20px; }
    .col-search input {
      flex: 1; min-width: 0;
      height: 100%;
      background: transparent;
      border: none; outline: none;
      font-family: inherit; font-size: 16px; line-height: 22px;
      color: var(--text-primary);
      padding: 0;
    }
    .col-search input::placeholder { color: #6B7280; }
    .col-search-clear {
      width: 24px; height: 24px;
      border: none; background: transparent; cursor: pointer;
      color: var(--text-secondary);
      display: none; align-items: center; justify-content: center;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .col-search-clear:hover { color: var(--text-primary); }
    .col-search-clear.show { display: inline-flex; }

    .col-count {
      font-size: 13px; font-weight: 700;
      /* WCAG AA — secondary (#4B5563) on shell or layer-03 ≥ 7:1 */
      color: var(--text-secondary);
      font-variant-numeric: tabular-nums;
    }
    .col-count em {
      font-style: normal;
      color: var(--text-primary);
    }

    /* Skid segmented control — .sg-group / .sg-item spec */
    .col-mode-toggle {
      display: inline-flex;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      height: 40px;
    }
    .col-mode-btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 6px;
      height: 100%; padding: 0 16px;
      background: var(--surface-layer02);
      border: none; border-right: 1px solid var(--border);
      cursor: pointer;
      font-family: inherit; font-size: 14px; font-weight: 700; line-height: 19px;
      /* WCAG AA — text-secondary on layer-02 = 7.24:1 (passes AA + AAA) */
      color: var(--text-secondary);
      box-sizing: border-box;
      transition: background 120ms, color 120ms;
    }
    .col-mode-btn:last-child { border-right: none; }
    .col-mode-btn svg { width: 14px; height: 14px; }
    .col-mode-btn:hover:not(.is-active) {
      background: var(--surface-layer01-hover);
      color: var(--text-primary);
    }
    .col-mode-btn.is-active {
      /* White on #027CB1 = 4.6:1, passes WCAG AA for bold/14px text */
      background: var(--action-secondary); color: #FFFFFF;
    }
    .col-mode-btn:focus-visible {
      outline: 2px solid var(--border-focus);
      outline-offset: 2px;
    }

    /* ─── Section heading ───────────────────────────────────── */
    .col-section { margin-top: 40px; }
    .col-section:first-of-type { margin-top: 0; }
    .col-section-label {
      display: block; font-size: 12px; font-weight: 700;
      line-height: 16px; color: var(--text-secondary);
      letter-spacing: 0.4px;
      margin-bottom: 24px;
    }

    /* ─── Ramp ─────────────────────────────────────────────── */
    .col-ramp { margin-bottom: 24px; }
    .col-ramp-name {
      display: block; font-size: 12px; font-weight: 700;
      line-height: 16px; color: var(--text-secondary);
      margin-bottom: 10px;
    }
    .col-ramp-row {
      display: grid;
      grid-template-columns: repeat(13, minmax(0, 1fr));
      gap: 8px;
    }
    .col-ramp--10 .col-ramp-row { grid-template-columns: repeat(10, minmax(0, 1fr)); max-width: calc(((100% - (8px * 12)) / 13 * 10) + (8px * 9)); }
    @media (max-width: 900px) {
      .col-ramp-row,
      .col-ramp--10 .col-ramp-row { grid-template-columns: repeat(5, 1fr); max-width: none; }
    }

    /* ─── Swatch ───────────────────────────────────────────── */
    .sw {
      position: relative;
      aspect-ratio: 1;
      border-radius: 6px;
      border: 1px solid transparent;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.04);
      cursor: pointer;
      transition: transform 120ms, box-shadow 120ms;
    }
    .sw:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.08), inset 0 0 0 1px rgba(0,0,0,0.04);
    }
    .sw:focus-visible {
      outline: 2px solid var(--border-focus);
      outline-offset: 2px;
    }
    .sw.is-hit { animation: sw-flash 600ms ease-out; }
    @keyframes sw-flash {
      0% { box-shadow: 0 0 0 0 rgba(90,191,224,0.55), inset 0 0 0 1px rgba(0,0,0,0.04); }
      100% { box-shadow: 0 0 0 14px rgba(90,191,224,0), inset 0 0 0 1px rgba(0,0,0,0.04); }
    }
    .sw[hidden] { display: none; }

    /* Floating tooltip on hover */
    .sw-tip {
      position: fixed; z-index: 100;
      pointer-events: none;
      padding: 8px 10px;
      background: var(--text-primary);
      color: #FFFFFF;
      border-radius: 6px;
      font-size: 12px; font-weight: 700;
      line-height: 1.4;
      box-shadow: 0 4px 14px rgba(15,23,42,0.15);
      opacity: 0; transform: translateY(4px);
      transition: opacity 100ms, transform 100ms;
    }
    .sw-tip.show { opacity: 1; transform: translateY(0); }
    .sw-tip-token { font-family: var(--mono); font-weight: 400; opacity: 0.78; }
    [data-theme="dark"] .sw-tip { background: #FFFFFF; color: #0F0F0F; }

    /* ─── Semantic tokens (IBM-style table) ─────────────────── */
    .col-sem-group { margin-bottom: 32px; }
    .col-sem-group:last-child { margin-bottom: 0; }
    .col-sem-group-label {
      display: block;
      font-size: 13px; font-weight: 700;
      line-height: 16px; color: var(--text-secondary);
      letter-spacing: 0.4px; text-transform: uppercase;
      margin-bottom: 10px;
    }

    .col-sem-table {
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .col-sem-row {
      display: grid;
      grid-template-columns: minmax(160px, 220px) minmax(200px, 1fr) minmax(160px, 220px) 72px;
      border-bottom: 1px solid var(--border);
      transition: background 120ms;
    }
    .col-sem-row:last-child { border-bottom: none; }
    .col-sem-row:not(.col-sem-row--head):hover { background: var(--surface-layer01); }

    .col-sem-cell {
      padding: 16px 18px;
      border-right: 1px solid var(--border);
      display: flex; align-items: center;
      font-size: 14px; line-height: 20px;
      color: var(--text-secondary);
      min-width: 0;
    }
    .col-sem-cell:last-child {
      border-right: none;
      justify-content: center;
    }

    /* Header row */
    .col-sem-row--head .col-sem-cell {
      font-size: 12px; font-weight: 700; line-height: 16px;
      color: var(--text-primary);
      background: var(--surface-layer01);
      letter-spacing: 0.4px;
    }

    /* Token chip — monospaced badge */
    .col-sem-token {
      display: inline-flex; align-items: center;
      padding: 4px 8px;
      font-family: var(--mono);
      font-size: 13px; font-weight: 400; line-height: 16px;
      color: var(--text-primary);
      background: var(--surface-layer02);
      border-radius: 4px;
      white-space: nowrap;
    }

    /* Value cell — primitive name above hex */
    .col-sem-value {
      display: flex; flex-direction: column; gap: 2px;
      line-height: 18px;
      min-width: 0;
    }
    .col-sem-value-name {
      font-size: 14px; color: var(--text-primary); font-weight: 400;
    }
    .col-sem-value-sep {
      display: block; width: 16px; height: 1px;
      background: var(--text-tertiary);
      margin: 2px 0;
      opacity: 0.5;
    }
    .col-sem-value-hex {
      font-family: var(--mono);
      font-size: 13px; color: var(--text-secondary);
    }

    /* Swatch circle */
    .col-sem-swatch {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.06);
      cursor: pointer;
      transition: transform 120ms;
      padding: 0;
    }
    .col-sem-swatch:hover { transform: scale(1.08); }
    .col-sem-swatch:focus-visible {
      outline: 2px solid var(--border-focus);
      outline-offset: 2px;
    }
    .col-sem-swatch.is-hit { animation: sw-flash 600ms ease-out; }

    @media (max-width: 720px) {
      .col-sem-row {
        grid-template-columns: 1fr 64px;
        grid-template-areas:
          "token swatch"
          "role swatch"
          "value swatch";
      }
      .col-sem-cell { border-right: none; padding: 14px 14px 6px; }
      .col-sem-cell:nth-child(1) { grid-area: token; }
      .col-sem-cell:nth-child(2) { grid-area: role; padding-top: 0; padding-bottom: 6px; }
      .col-sem-cell:nth-child(3) { grid-area: value; padding-top: 0; padding-bottom: 14px; }
      .col-sem-cell:nth-child(4) { grid-area: swatch; border-left: 1px solid var(--border); padding: 14px; }
      .col-sem-row--head { display: none; }
    }

    /* Empty state */
    .col-empty {
      padding: 60px 20px; text-align: center;
      /* WCAG AA — secondary (#4B5563) on shell ≥ 7:1 */
      color: var(--text-secondary);
      border: 1px dashed var(--border);
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }
    .col-empty.show { display: block; }

    /* Copy toast */
    .col-copied {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
      z-index: 200; opacity: 0;
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 16px;
      background: var(--text-primary); color: #FFFFFF;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(15,23,42,0.18);
      font-size: 13px; font-weight: 700;
      pointer-events: none;
      transition: opacity 180ms, transform 180ms;
    }
    .col-copied svg { width: 14px; height: 14px; color: #5ABFE0; }
    .col-copied.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    [data-theme="dark"] .col-copied { background: #FFFFFF; color: #0F0F0F; }
    [data-theme="dark"] .col-copied svg { color: #027CB1; }
  </style>
</head>
<body>

<!-- MOBILE OVERLAY -->
<div id="navOverlay" class="nav-overlay" onclick="toggleSidebar()"></div>

<!-- TOP NAV -->
<nav class="topnav">
  <button class="hamburger" onclick="toggleSidebar()" aria-label="Menu">
    <i data-lucide="menu" style="width:18px;height:18px;color:var(--text-secondary)"></i>
  </button>
  <div class="bc">
    <span class="cur">Color</span>
  </div>
  <div class="nav-actions">
    <div class="toggle-wrap" onclick="toggleTheme()" role="button">
      <i data-lucide="moon" style="width:20px;height:20px"></i>
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
      <i data-lucide="sun" style="width:20px;height:20px"></i>
    </div>
  </div>
</nav>

<div class="shell">

  <!-- LEFT NAV (built by nav-scroll.js) -->
  <nav class="left-nav" id="leftNav">
    <div class="left-nav-inner"></div>
  </nav>

  <!-- CONTENT -->
  <div class="content-wrap" id="contentWrap">
    <main class="col-page">

      <header class="col-head">
        <h1 class="col-title">Color</h1>
        <p class="col-sub">nuShip Design System · Color Styles</p>
      </header>

      <!-- Sentinel — when this scrolls past the sticky offset, the toolbar pops out -->
      <div id="colToolbarSentinel" class="col-sentinel" aria-hidden="true"></div>

      <!-- Toolbar -->
      <div class="col-toolbar" id="colToolbar" role="toolbar" aria-label="Color tools">
        <label class="col-search">
          <i data-lucide="search" class="col-search-icon" aria-hidden="true"></i>
          <input id="colSearch" type="search" placeholder="Search by name or hex (e.g. blue, 027CB1)" aria-label="Search swatches">
          <button id="colSearchClear" class="col-search-clear" type="button" aria-label="Clear search"><i data-lucide="x" style="width:14px;height:14px"></i></button>
        </label>
        <span class="col-count"><em id="colCount">0</em> swatches</span>
        <div class="col-mode-toggle" id="colModeToggle" role="tablist" aria-label="Theme preview">
          <button class="col-mode-btn is-active" data-mode="light" role="tab" aria-selected="true" type="button"><i data-lucide="sun"></i>Light</button>
          <button class="col-mode-btn" data-mode="dark" role="tab" aria-selected="false" type="button"><i data-lucide="moon"></i>Dark</button>
        </div>
      </div>

      <!-- SEMANTIC TOKENS (moved to top) -->
      <section class="col-section" id="semanticTokens">
        <span class="col-section-label">Semantic tokens</span>
        <div id="semRoot"></div>
        <div class="col-empty" id="semEmpty">No semantic tokens match that search.</div>
      </section>

      <!-- PRIMITIVE PALETTE -->
      <section class="col-section" id="primitivePalette">
        <span class="col-section-label">Primitive palette</span>
        <div id="rampsRoot"></div>
        <div class="col-empty" id="rampsEmpty">No primitive swatches match that search.</div>
      </section>

    </main>
  </div>

</div><!-- /shell -->

<!-- Floating tooltip + copy toast -->
<div class="sw-tip" id="swTip" role="tooltip" aria-hidden="true"></div>
<div class="col-copied" id="colCopied" role="status" aria-live="polite">
  <i data-lucide="check"></i><span id="colCopiedLabel">Copied</span>
</div>

<script>
  lucide.createIcons();

  // ─── Sidebar boilerplate ───────────────────────────────────
  const isMobile = () => window.innerWidth <= 768;
  let sbOpen = !isMobile();
  if (!sbOpen) document.getElementById('leftNav').classList.add('hidden');
  function toggleSidebar() {
    sbOpen = !sbOpen;
    document.getElementById('leftNav').classList.toggle('hidden', !sbOpen);
    if (!isMobile()) document.getElementById('contentWrap').style.marginLeft = sbOpen ? 'var(--left-w)' : '0';
    document.getElementById('navOverlay').classList.toggle('active', sbOpen && isMobile());
  }

  // ─── Color data ────────────────────────────────────────────
  // Primitive ramps — sourced from Figma node 3857-9633
  const RAMPS = [
    { name: 'Gray', stops: [
      { step: '50',  hex: '#F9FAFB' }, { step: '100', hex: '#F4F6F8' },
      { step: '150', hex: '#EFF1F3' }, { step: '200', hex: '#E5E7EB' },
      { step: '300', hex: '#CDD2D7' }, { step: '400', hex: '#9CA3AF' },
      { step: '500', hex: '#6B7280' }, { step: '600', hex: '#4B5563' },
      { step: '700', hex: '#374151' }, { step: '750', hex: '#2B3038' },
      { step: '800', hex: '#1E1E1E' }, { step: '900', hex: '#0F0F0F' },
      { step: '950', hex: '#0A0A0A' }
    ]},
    { name: 'Red', stops: [
      { step: '50',  hex: '#FCE8E8' }, { step: '100', hex: '#F1E6E6' },
      { step: '200', hex: '#F8D0D0' }, { step: '300', hex: '#F2A3A3' },
      { step: '400', hex: '#E36868' }, { step: '500', hex: '#DC4B4B' },
      { step: '600', hex: '#DB3939' }, { step: '700', hex: '#C63B3B' },
      { step: '800', hex: '#A12F2F' }, { step: '900', hex: '#811F1F' }
    ]},
    { name: 'Green', stops: [
      { step: '50',  hex: '#E8F2E8' }, { step: '100', hex: '#C8E6C8' },
      { step: '200', hex: '#A0D4A0' }, { step: '300', hex: '#6FBF8A' },
      { step: '500', hex: '#33A17A' }, { step: '600', hex: '#00902C' },
      { step: '700', hex: '#006C21' }, { step: '800', hex: '#004816' },
      { step: '900', hex: '#003322' }
    ]},
    { name: 'Blue', stops: [
      { step: '50',  hex: '#E5EEF5' }, { step: '100', hex: '#D6EAF4' },
      { step: '200', hex: '#B7DBEE' }, { step: '300', hex: '#8FCBE6' },
      { step: '400', hex: '#5ABFE0' }, { step: '500', hex: '#35A8D6' },
      { step: '600', hex: '#027CB1' }, { step: '700', hex: '#016692' },
      { step: '800', hex: '#004F70' }, { step: '900', hex: '#001F33' }
    ]},
    { name: 'Orange', stops: [
      { step: '50',  hex: '#FDF4E8' }, { step: '100', hex: '#FAE4C4' },
      { step: '200', hex: '#F5CE93' }, { step: '300', hex: '#EDB462' },
      { step: '400', hex: '#E49A35' }, { step: '500', hex: '#DB8512' },
      { step: '600', hex: '#D37203' }, { step: '700', hex: '#A85A02' },
      { step: '800', hex: '#6E3B01' }, { step: '900', hex: '#331E00' }
    ]},
    { name: 'Purple', stops: [
      { step: '50',  hex: '#F0ECF4' }, { step: '100', hex: '#DED4E8' },
      { step: '200', hex: '#C8B4D8' }, { step: '300', hex: '#B293CB' },
      { step: '400', hex: '#9B72BD' }, { step: '500', hex: '#8459A8' },
      { step: '600', hex: '#6D4092' }, { step: '700', hex: '#572F78' },
      { step: '800', hex: '#48236C' }, { step: '900', hex: '#3A1860' }
    ]},
    { name: 'Sky', stops: [
      { step: '50',  hex: '#E8F7FC' }, { step: '100', hex: '#C8EDF9' },
      { step: '200', hex: '#A4E2F7' }, { step: '300', hex: '#B0F0FF' },
      { step: '400', hex: '#ADEDFF' }, { step: '500', hex: '#8ADBF9' },
      { step: '600', hex: '#67C9F3' }, { step: '700', hex: '#3DA6D4' },
      { step: '800', hex: '#1F7EA8' }, { step: '900', hex: '#0D4F6E' }
    ]},
    { name: 'Lime', stops: [
      { step: '50',  hex: '#F0FDE4' }, { step: '100', hex: '#DAFBBF' },
      { step: '200', hex: '#C4F998' }, { step: '300', hex: '#B8FA82' },
      { step: '400', hex: '#ACF96C' }, { step: '500', hex: '#78E977' },
      { step: '600', hex: '#4CD982' }, { step: '700', hex: '#30B466' },
      { step: '800', hex: '#1C8A4A' }, { step: '900', hex: '#0E5C30' }
    ]},
    { name: 'Magenta', stops: [
      { step: '50',  hex: '#FDE8F0' }, { step: '100', hex: '#FCC8D8' },
      { step: '200', hex: '#FA9EBA' }, { step: '300', hex: '#F86F9B' },
      { step: '400', hex: '#FF4081' }, { step: '500', hex: '#D72071' },
      { step: '600', hex: '#AF0061' }, { step: '700', hex: '#8C004E' },
      { step: '800', hex: '#66003A' }, { step: '900', hex: '#400025' }
    ]}
  ];

  // Semantic tokens — Token / Role / Value with primitive name + hex
  // for both light and dark themes. Sourced from Figma node 3857-9633.
  const SEMANTIC = [
    { name: 'Text', items: [
      { token: 'text-primary',   role: 'Primary text on default backgrounds',
        light: { name: 'Gray 700', hex: '#374151' }, dark: { name: 'White',    hex: '#FFFFFF' } },
      { token: 'text-secondary', role: 'Supporting paragraph and body copy',
        light: { name: 'Gray 600', hex: '#4B5563' }, dark: { name: 'Gray 200', hex: '#E5E7EB' } },
      { token: 'text-tertiary',  role: 'Placeholders, captions, metadata',
        light: { name: 'Gray 400', hex: '#9CA3AF' }, dark: { name: 'Gray 300', hex: '#CDD2D7' } },
      { token: 'text-disabled',  role: 'Disabled labels and inputs',
        light: { name: 'Gray 400', hex: '#9CA3AF' }, dark: { name: 'Gray 500', hex: '#6B7280' } },
      { token: 'text-helper',    role: 'Field hints and supporting copy',
        light: { name: 'Gray 600', hex: '#4B5563' }, dark: { name: 'Gray 200', hex: '#E5E7EB' } }
    ]},
    { name: 'Surface', items: [
      { token: 'surface-layer-01', role: 'First elevation — cards, panels, modals',
        light: { name: 'Gray 50',  hex: '#F9FAFB' }, dark: { name: 'Gray 800', hex: '#1E1E1E' } },
      { token: 'surface-layer-02', role: 'Second elevation — nested panels, toolbars',
        light: { name: 'Gray 100', hex: '#F4F6F8' }, dark: { name: 'Gray 750', hex: '#2B3038' } },
      { token: 'surface-layer-03', role: 'Third elevation — floating utilities, popovers',
        light: { name: 'Gray 200', hex: '#E5E7EB' }, dark: { name: 'Gray 700', hex: '#374151' } },
      { token: 'surface-shell',    role: 'Page background canvas',
        light: { name: 'White',    hex: '#FFFFFF' }, dark: { name: 'Gray 950', hex: '#0A0A0A' } }
    ]},
    { name: 'Border', items: [
      { token: 'border-interactive', role: 'Default border — inputs, cards, dividers',
        light: { name: 'Gray 300', hex: '#CDD2D7' }, dark: { name: 'Gray 500', hex: '#6B7280' } },
      { token: 'border-strong',      role: 'Emphasized — strong dividers, separators',
        light: { name: 'Gray 400', hex: '#9CA3AF' }, dark: { name: 'Gray 400', hex: '#9CA3AF' } },
      { token: 'border-soft',        role: 'Subtle — between body content',
        light: { name: 'Gray 200', hex: '#E5E7EB' }, dark: { name: 'Gray 700', hex: '#374151' } },
      { token: 'border-disabled',    role: 'Non-interactive surface borders',
        light: { name: 'Gray 200', hex: '#E5E7EB' }, dark: { name: 'Gray 700', hex: '#374151' } },
      { token: 'border-focus',       role: 'Keyboard focus ring',
        light: { name: 'Blue 400', hex: '#5ABFE0' }, dark: { name: 'Blue 600 alt', hex: '#0083BB' } }
    ]},
    { name: 'Icon', items: [
      { token: 'icon-default', role: 'Neutral icons in body content',
        light: { name: 'Gray 600', hex: '#4B5563' }, dark: { name: 'Gray 200', hex: '#E5E7EB' } },
      { token: 'icon-info',    role: 'Informational status icons',
        light: { name: 'Blue 600', hex: '#027CB1' }, dark: { name: 'Blue 300', hex: '#8FCBE6' } },
      { token: 'icon-button',  role: 'Icon on filled-button backgrounds',
        light: { name: 'White',    hex: '#FFFFFF' }, dark: { name: 'Gray 950', hex: '#0A0A0A' } },
      { token: 'icon-hover',   role: 'Icon color on interactive hover',
        light: { name: 'Gray 400', hex: '#9CA3AF' }, dark: { name: 'Gray 200', hex: '#E5E7EB' } },
      { token: 'icon-loading', role: 'Spinners and progress fills',
        light: { name: 'Blue 600 alt', hex: '#0083BB' }, dark: { name: 'Blue 600 alt', hex: '#0083BB' } }
    ]},
    { name: 'Interactive', items: [
      { token: 'interactive-default',  role: 'Link in body copy',
        light: { name: 'Blue 700', hex: '#016692' }, dark: { name: 'Blue 400', hex: '#5ABFE0' } },
      { token: 'interactive-hover',    role: 'Link on hover',
        light: { name: 'Blue 800', hex: '#004F70' }, dark: { name: 'Blue 600', hex: '#027CB1' } },
      { token: 'interactive-pressed',  role: 'Link when active or pressed',
        light: { name: 'Blue 900', hex: '#001F33' }, dark: { name: 'Blue 700', hex: '#016692' } },
      { token: 'interactive-disabled', role: 'Non-interactive link state',
        light: { name: 'Gray 500', hex: '#6B7280' }, dark: { name: 'Gray 600', hex: '#4B5563' } }
    ]},
    { name: 'Feedback', items: [
      { token: 'feedback-success', role: 'Confirmation and completed states',
        light: { name: 'Green 700',  hex: '#006C21' }, dark: { name: 'Green 500',  hex: '#33A17A' } },
      { token: 'feedback-warning', role: 'Caution — needs attention',
        light: { name: 'Orange 700', hex: '#A85A02' }, dark: { name: 'Orange 400', hex: '#E49A35' } },
      { token: 'feedback-error',   role: 'Errors and failed validation',
        light: { name: 'Red 800',    hex: '#A12F2F' }, dark: { name: 'Red 400',    hex: '#E36868' } },
      { token: 'feedback-info',    role: 'Informational alerts',
        light: { name: 'Blue 600',   hex: '#027CB1' }, dark: { name: 'Blue 300',   hex: '#8FCBE6' } }
    ]}
  ];

  // ─── Render ────────────────────────────────────────────────
  const rampsRoot = document.getElementById('rampsRoot');
  const semRoot   = document.getElementById('semRoot');
  let totalSwatches = 0;

  function tokenName(ramp, step) {
    return 'color/' + ramp.toLowerCase() + '/' + step;
  }
  function makeSwatch(token, hex, extra) {
    extra = extra || '';
    return '<button class="sw" style="background:' + hex + '" data-token="' + token + '" data-hex="' + hex + '" type="button" aria-label="' + token + ' ' + hex + '"></button>';
  }

  RAMPS.forEach(function(r){
    const ramp = document.createElement('div');
    ramp.className = 'col-ramp col-ramp--' + r.stops.length;
    let row = '';
    r.stops.forEach(function(s){
      totalSwatches++;
      row += makeSwatch(tokenName(r.name, s.step), s.hex);
    });
    ramp.innerHTML =
      '<span class="col-ramp-name">' + r.name + '</span>' +
      '<div class="col-ramp-row">' + row + '</div>';
    rampsRoot.appendChild(ramp);
  });

  // Render semantic groups as IBM-style tables (one per category)
  SEMANTIC.forEach(function(group){
    const wrap = document.createElement('div');
    wrap.className = 'col-sem-group';
    wrap.dataset.group = group.name;

    let rows =
      '<div class="col-sem-row col-sem-row--head" role="row">' +
        '<span class="col-sem-cell" role="columnheader">Token</span>' +
        '<span class="col-sem-cell" role="columnheader">Role</span>' +
        '<span class="col-sem-cell" role="columnheader">Value</span>' +
        '<span class="col-sem-cell" role="columnheader" aria-label="Preview"></span>' +
      '</div>';

    group.items.forEach(function(it){
      totalSwatches++; // one swatch shown at a time per row
      rows +=
        '<div class="col-sem-row" role="row"' +
          ' data-token="$' + it.token + '"' +
          ' data-role="'  + it.role.replace(/"/g, '&quot;') + '"' +
          ' data-light-name="' + it.light.name + '"' +
          ' data-light-hex="'  + it.light.hex  + '"' +
          ' data-dark-name="'  + it.dark.name  + '"' +
          ' data-dark-hex="'   + it.dark.hex   + '">' +
          '<span class="col-sem-cell" role="cell"><code class="col-sem-token">$' + it.token + '</code></span>' +
          '<span class="col-sem-cell" role="cell">' + it.role + '</span>' +
          '<span class="col-sem-cell" role="cell">' +
            '<span class="col-sem-value">' +
              '<span class="col-sem-value-name" data-name></span>' +
              '<span class="col-sem-value-sep" aria-hidden="true"></span>' +
              '<span class="col-sem-value-hex"  data-hex></span>' +
            '</span>' +
          '</span>' +
          '<span class="col-sem-cell" role="cell">' +
            '<button class="col-sem-swatch" type="button" data-swatch data-token="$' + it.token + '" aria-label="' + it.token + ' swatch"></button>' +
          '</span>' +
        '</div>';
    });

    wrap.innerHTML =
      '<span class="col-sem-group-label">' + group.name + '</span>' +
      '<div class="col-sem-table" role="table">' + rows + '</div>';
    semRoot.appendChild(wrap);
  });

  document.getElementById('colCount').textContent = totalSwatches;

  // ─── Interactivity ────────────────────────────────────────
  const tip = document.getElementById('swTip');
  const copied = document.getElementById('colCopied');
  const copiedLabel = document.getElementById('colCopiedLabel');
  let copiedTimer = null;

  function showTip(target, token, hex) {
    tip.innerHTML = '<div>' + hex + '</div><div class="sw-tip-token">' + token + '</div>';
    const r = target.getBoundingClientRect();
    tip.style.left = Math.max(8, Math.min(window.innerWidth - 220, r.left + r.width / 2 - 90)) + 'px';
    tip.style.top  = Math.max(8, r.top - 56) + 'px';
    tip.classList.add('show');
    tip.setAttribute('aria-hidden', 'false');
  }
  function hideTip() { tip.classList.remove('show'); tip.setAttribute('aria-hidden', 'true'); }

  function fallbackCopy(text) {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
    } catch (e) { /* noop */ }
  }
  async function copyHex(hex, target) {
    try {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(hex);
      } else { fallbackCopy(hex); }
    } catch (e) { fallbackCopy(hex); }
    if (target) {
      target.classList.add('is-hit');
      setTimeout(function(){ target.classList.remove('is-hit'); }, 600);
    }
    copiedLabel.textContent = 'Copied ' + hex;
    copied.classList.add('show');
    clearTimeout(copiedTimer);
    copiedTimer = setTimeout(function(){ copied.classList.remove('show'); }, 1600);
  }

  // Bind primitive swatches (single hex each)
  function bindPrimitive(el) {
    el.addEventListener('mouseenter', function(){
      showTip(el, el.dataset.token, el.dataset.hex);
    });
    el.addEventListener('mouseleave', hideTip);
    el.addEventListener('focus', function(){ showTip(el, el.dataset.token, el.dataset.hex); });
    el.addEventListener('blur', hideTip);
    el.addEventListener('click', function(){ copyHex(el.dataset.hex, el); });
  }
  document.querySelectorAll('.sw').forEach(bindPrimitive);

  // Bind semantic swatches — token + hex read from the parent row's
  // data attrs so the same swatch updates value/preview when mode flips.
  function bindSemanticSwatch(el) {
    function ctx() {
      const row = el.closest('.col-sem-row');
      return {
        token: row.dataset.token,
        hex: el.style.backgroundColor && el.dataset.hex ? el.dataset.hex : row.dataset.lightHex
      };
    }
    el.addEventListener('mouseenter', function(){
      const c = ctx(); showTip(el, c.token, el.dataset.hex || c.hex);
    });
    el.addEventListener('mouseleave', hideTip);
    el.addEventListener('focus', function(){ const c = ctx(); showTip(el, c.token, el.dataset.hex || c.hex); });
    el.addEventListener('blur', hideTip);
    el.addEventListener('click', function(){ copyHex(el.dataset.hex || ctx().hex, el); });
  }
  document.querySelectorAll('#semRoot [data-swatch]').forEach(bindSemanticSwatch);

  // ─── Light/dark preview toggle ────────────────────────────
  const modeBtns = document.querySelectorAll('#colModeToggle .col-mode-btn');
  function applyMode(mode) {
    modeBtns.forEach(function(b){
      const active = b.dataset.mode === mode;
      b.classList.toggle('is-active', active);
      b.setAttribute('aria-selected', active ? 'true' : 'false');
    });
    document.querySelectorAll('#semRoot .col-sem-row:not(.col-sem-row--head)').forEach(function(row){
      const name = mode === 'dark' ? row.dataset.darkName : row.dataset.lightName;
      const hex  = mode === 'dark' ? row.dataset.darkHex  : row.dataset.lightHex;
      const nameEl = row.querySelector('[data-name]');
      const hexEl  = row.querySelector('[data-hex]');
      const swatch = row.querySelector('[data-swatch]');
      if (nameEl) nameEl.textContent = name;
      if (hexEl)  hexEl.textContent  = hex;
      if (swatch) {
        swatch.style.background = hex;
        swatch.dataset.hex = hex;
      }
    });
  }
  modeBtns.forEach(function(b){
    b.addEventListener('click', function(){ applyMode(b.dataset.mode); });
  });
  applyMode('light');

  // ─── Search filter ────────────────────────────────────────
  const searchEl = document.getElementById('colSearch');
  const clearEl  = document.getElementById('colSearchClear');
  const countEl  = document.getElementById('colCount');
  const rampsEmpty = document.getElementById('rampsEmpty');
  const semEmpty   = document.getElementById('semEmpty');

  function matches(query, token, hex) {
    if (!query) return true;
    const q = query.toLowerCase().replace(/^#/, '');
    return token.toLowerCase().includes(q) || hex.toLowerCase().replace('#', '').includes(q);
  }
  function applyFilter() {
    const q = searchEl.value.trim();
    clearEl.classList.toggle('show', q.length > 0);
    let visible = 0;

    // Primitive ramps
    let rampsVisible = 0;
    document.querySelectorAll('#rampsRoot .col-ramp').forEach(function(ramp){
      let rampVisible = 0;
      ramp.querySelectorAll('.sw').forEach(function(s){
        const ok = matches(q, s.dataset.token, s.dataset.hex);
        s.hidden = !ok;
        if (ok) { rampVisible++; visible++; }
      });
      ramp.style.display = rampVisible > 0 ? '' : 'none';
      if (rampVisible > 0) rampsVisible++;
    });
    rampsEmpty.classList.toggle('show', rampsVisible === 0 && !!q);

    // Semantic — match against token, role text, or either theme's name/hex
    let semVisibleGroups = 0;
    document.querySelectorAll('#semRoot .col-sem-group').forEach(function(group){
      let rowsVisible = 0;
      group.querySelectorAll('.col-sem-row:not(.col-sem-row--head)').forEach(function(row){
        const token = row.dataset.token || '';
        const role  = row.dataset.role  || '';
        const lh = row.dataset.lightHex || '';
        const dh = row.dataset.darkHex  || '';
        const ln = row.dataset.lightName || '';
        const dn = row.dataset.darkName  || '';
        const haystack = (token + ' ' + role + ' ' + ln + ' ' + dn).toLowerCase();
        const qLower = q.toLowerCase().replace(/^#/, '');
        const ok = !q || haystack.includes(qLower) ||
                   lh.toLowerCase().replace('#','').includes(qLower) ||
                   dh.toLowerCase().replace('#','').includes(qLower);
        row.style.display = ok ? '' : 'none';
        if (ok) { rowsVisible++; visible++; }
      });
      group.style.display = rowsVisible > 0 ? '' : 'none';
      if (rowsVisible > 0) semVisibleGroups++;
    });
    semEmpty.classList.toggle('show', semVisibleGroups === 0 && !!q);

    countEl.textContent = visible;
  }
  searchEl.addEventListener('input', applyFilter);
  clearEl.addEventListener('click', function(){ searchEl.value = ''; applyFilter(); searchEl.focus(); });

  // keyboard shortcut: '/' focuses the search
  document.addEventListener('keydown', function(e){
    if (e.key === '/' && document.activeElement !== searchEl) {
      e.preventDefault();
      searchEl.focus(); searchEl.select();
    }
  });

  // ─── Sticky pop-out detection ─────────────────────────────
  // When the sentinel above the toolbar leaves the viewport, the
  // toolbar has reached its sticky anchor — apply the layer-03 backdrop.
  // The sticky anchor sits 80px below the topnav so it never glues to
  // the page's top edge (IBM Carbon pattern).
  const toolbarEl = document.getElementById('colToolbar');
  const sentinel  = document.getElementById('colToolbarSentinel');
  if ('IntersectionObserver' in window && toolbarEl && sentinel) {
    const obs = new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        toolbarEl.classList.toggle('is-stuck', e.intersectionRatio === 0);
      });
    }, { threshold: [0, 1], rootMargin: '-81px 0px 0px 0px' });
    obs.observe(sentinel);
  }
</script>
</body>
