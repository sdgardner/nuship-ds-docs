<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radius — nuShip Design System</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="nav-scroll.js" defer></script>
  <style>
    .rd-page { padding: 56px 40px 96px; max-width: 1200px; margin: 0 auto; }
    @media (max-width: 720px) { .rd-page { padding: 40px 20px 72px; } }
    .rd-head { display: flex; flex-direction: column; gap: 8px; margin-bottom: 32px; }
    .rd-title { font-size: 32px; line-height: 38px; font-weight: 700; color: var(--text-primary); margin: 0; }
    .rd-sub { font-size: 14px; line-height: 19px; color: var(--text-secondary); margin: 0; }

    .rd-sentinel { height: 1px; margin-top: -1px; }
    .rd-toolbar {
      display: flex; align-items: center; gap: 24px;
      flex-wrap: wrap; padding: 12px 0; margin-bottom: 28px;
      position: sticky; top: 80px; z-index: 8;
      background: transparent;
      transition: background 180ms, box-shadow 180ms, padding 180ms, max-width 180ms, border-radius 180ms;
    }
    .rd-toolbar.is-stuck {
      padding: 14px 20px;
      max-width: 720px; margin-left: auto; margin-right: auto;
      background: var(--surface-card);
      border: 1px solid var(--border-soft);
      border-radius: 12px;
      box-shadow: 0 10px 28px -14px rgba(15, 23, 42, 0.18);
    }
    [data-theme="dark"] .rd-toolbar.is-stuck { box-shadow: 0 10px 28px -14px rgba(0, 0, 0, 0.6); }

    .rd-search {
      display: flex; align-items: center; gap: 8px;
      height: 48px; padding: 0 12px;
      background: var(--surface-field);
      border: 1px solid var(--border);
      border-radius: 4px;
      flex: 1; min-width: 240px; max-width: 420px;
      box-sizing: border-box;
      transition: border-color 120ms, box-shadow 120ms;
    }
    .rd-search:hover { border-color: var(--text-secondary); }
    .rd-search:focus-within {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 4px rgba(90, 191, 224, 0.35);
    }
    [data-theme="dark"] .rd-search:focus-within { box-shadow: 0 0 0 4px rgba(0, 131, 187, 0.35); }
    .rd-search-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); flex-shrink: 0; }
    .rd-search-icon svg { width: 20px; height: 20px; }
    .rd-search input {
      flex: 1; min-width: 0; height: 100%;
      background: transparent; border: none; outline: none;
      font-family: inherit; font-size: 16px; line-height: 22px;
      color: var(--text-primary); padding: 0;
    }
    .rd-search input::placeholder { color: #6B7280; }
    .rd-search-clear {
      width: 24px; height: 24px; border: none; background: transparent;
      cursor: pointer; color: var(--text-secondary);
      display: none; align-items: center; justify-content: center;
      border-radius: 2px; flex-shrink: 0;
    }
    .rd-search-clear:hover { color: var(--text-primary); }
    .rd-search-clear.show { display: inline-flex; }

    .rd-count { font-size: 13px; font-weight: 700; color: var(--text-secondary); font-variant-numeric: tabular-nums; }
    .rd-count em { font-style: normal; color: var(--text-primary); }

    .rd-section { margin-top: 40px; }
    .rd-section:first-of-type { margin-top: 0; }
    .rd-section-label {
      display: block; font-size: 12px; font-weight: 700;
      line-height: 16px; color: var(--text-secondary);
      letter-spacing: 0.4px; margin-bottom: 24px;
    }

    .rd-table {
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .rd-row {
      display: grid;
      grid-template-columns: minmax(140px, 200px) minmax(220px, 1fr) minmax(80px, 110px) minmax(140px, 200px);
      border-bottom: 1px solid var(--border);
      transition: background 120ms;
    }
    .rd-row:last-child { border-bottom: none; }
    .rd-row:not(.rd-row--head):hover { background: var(--surface-layer01); }
    .rd-cell {
      padding: 20px 18px;
      border-right: 1px solid var(--border);
      display: flex; align-items: center;
      font-size: 14px; line-height: 20px;
      color: var(--text-secondary);
      min-width: 0;
    }
    .rd-cell:last-child { border-right: none; justify-content: center; padding: 16px; }
    .rd-row--head .rd-cell {
      font-size: 12px; font-weight: 700; line-height: 16px;
      color: var(--text-primary);
      background: var(--surface-layer01);
      letter-spacing: 0.4px;
    }

    .rd-token {
      display: inline-flex; align-items: center;
      padding: 4px 8px;
      font-family: var(--mono);
      font-size: 13px; line-height: 16px;
      color: var(--text-primary);
      background: var(--surface-layer02);
      border-radius: 4px; white-space: nowrap;
    }
    .rd-value-px {
      font-family: var(--mono); font-size: 14px;
      color: var(--text-primary); font-variant-numeric: tabular-nums;
    }

    /* Preview tile — square showing the corner radius applied */
    .rd-preview-tile {
      width: 80px; height: 80px;
      background: var(--action-secondary);
      transition: border-radius 180ms;
    }
    .rd-preview-tile--full {
      width: 120px; height: 56px;
    }

    @media (max-width: 720px) {
      .rd-row {
        grid-template-columns: 1fr 110px;
        grid-template-areas: "token preview" "role preview" "value preview";
      }
      .rd-cell { border-right: none; padding: 14px 14px 6px; }
      .rd-cell:nth-child(1) { grid-area: token; }
      .rd-cell:nth-child(2) { grid-area: role; padding-top: 0; padding-bottom: 6px; }
      .rd-cell:nth-child(3) { grid-area: value; padding-top: 0; padding-bottom: 14px; }
      .rd-cell:nth-child(4) { grid-area: preview; border-left: 1px solid var(--border); padding: 14px; }
      .rd-row--head { display: none; }
    }

    .rd-empty {
      padding: 60px 20px; text-align: center;
      color: var(--text-secondary);
      border: 1px dashed var(--border);
      border-radius: 10px;
      font-size: 14px; display: none;
    }
    .rd-empty.show { display: block; }
  </style>
</head>
<body>

<div id="navOverlay" class="nav-overlay" onclick="toggleSidebar()"></div>

<nav class="topnav">
  <button class="hamburger" onclick="toggleSidebar()" aria-label="Menu">
    <i data-lucide="menu" style="width:18px;height:18px;color:var(--text-secondary)"></i>
  </button>
  <div class="bc"><span class="cur">Radius</span></div>
  <div class="nav-actions">
    <div class="toggle-wrap" onclick="toggleTheme()" role="button">
      <i data-lucide="moon" style="width:20px;height:20px"></i>
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
      <i data-lucide="sun" style="width:20px;height:20px"></i>
    </div>
  </div>
</nav>

<div class="shell">
  <nav class="left-nav" id="leftNav"><div class="left-nav-inner"></div></nav>
  <div class="content-wrap" id="contentWrap">
    <main class="rd-page">

      <header class="rd-head">
        <h1 class="rd-title">Radius</h1>
        <p class="rd-sub">nuShip Design System · Radius Tokens</p>
      </header>

      <div id="rdToolbarSentinel" class="rd-sentinel" aria-hidden="true"></div>

      <div class="rd-toolbar" id="rdToolbar" role="toolbar" aria-label="Radius tools">
        <label class="rd-search">
          <i data-lucide="search" class="rd-search-icon" aria-hidden="true"></i>
          <input id="rdSearch" type="search" placeholder="Search by name, role, or value (e.g. button, pill, 8)" aria-label="Search radius tokens">
          <button id="rdSearchClear" class="rd-search-clear" type="button" aria-label="Clear search"><i data-lucide="x" style="width:14px;height:14px"></i></button>
        </label>
        <span class="rd-count"><em id="rdCount">0</em> tokens</span>
      </div>

      <section class="rd-section">
        <span class="rd-section-label">Radius scale</span>
        <div class="rd-table" id="rdRoot" role="table"></div>
        <div class="rd-empty" id="rdEmpty">No radius tokens match that search.</div>
      </section>

    </main>
  </div>
</div>

<script>
  lucide.createIcons();

  const isMobile = () => window.innerWidth <= 768;
  let sbOpen = !isMobile();
  if (!sbOpen) document.getElementById('leftNav').classList.add('hidden');
  function toggleSidebar() {
    sbOpen = !sbOpen;
    document.getElementById('leftNav').classList.toggle('hidden', !sbOpen);
    if (!isMobile()) document.getElementById('contentWrap').style.marginLeft = sbOpen ? 'var(--left-w)' : '0';
    document.getElementById('navOverlay').classList.toggle('active', sbOpen && isMobile());
  }

  // Skid radius scale — matches Figma tokens: radius/sm, /md, /lg, /xl, /focus, /full
  const RADII = [
    { token: 'radius/none', px: 0,   role: 'Sharp corners. Tables, hairline dividers, edge-to-edge banners.' },
    { token: 'radius/xs',   px: 2,   role: 'Subtle softening — chips, badges, checkboxes.' },
    { token: 'radius/sm',   px: 3,   role: 'Hairline-rounded controls inside segmented groups.' },
    { token: 'radius/md',   px: 4,   role: 'Default — inputs, buttons, small cards, segmented controls.' },
    { token: 'radius/lg',   px: 8,   role: 'Cards, alerts, file rows, dropdowns.' },
    { token: 'radius/xl',   px: 12,  role: 'Large surfaces — modals, popovers, stage panels.' },
    { token: 'radius/2xl',  px: 16,  role: 'Hero panels, marketing surfaces, splash containers.' },
    { token: 'radius/full', px: 100, role: 'Pills — avatars, indicators, fully-rounded chips.', full: true }
  ];

  const root = document.getElementById('rdRoot');

  let html =
    '<div class="rd-row rd-row--head" role="row">' +
      '<span class="rd-cell" role="columnheader">Token</span>' +
      '<span class="rd-cell" role="columnheader">Role</span>' +
      '<span class="rd-cell" role="columnheader">Value</span>' +
      '<span class="rd-cell" role="columnheader" aria-label="Preview"></span>' +
    '</div>';

  RADII.forEach(function(r){
    html +=
      '<div class="rd-row" role="row"' +
        ' data-token="$' + r.token + '"' +
        ' data-role="' + r.role.replace(/"/g, '&quot;') + '"' +
        ' data-px="' + r.px + '">' +
        '<span class="rd-cell" role="cell"><code class="rd-token">$' + r.token + '</code></span>' +
        '<span class="rd-cell" role="cell">' + r.role + '</span>' +
        '<span class="rd-cell" role="cell"><span class="rd-value-px">' + r.px + 'px</span></span>' +
        '<span class="rd-cell" role="cell">' +
          '<div class="rd-preview-tile' + (r.full ? ' rd-preview-tile--full' : '') + '" style="border-radius:' + r.px + 'px"></div>' +
        '</span>' +
      '</div>';
  });

  root.innerHTML = html;
  document.getElementById('rdCount').textContent = RADII.length;
  lucide.createIcons();

  // Search
  const searchEl = document.getElementById('rdSearch');
  const clearEl  = document.getElementById('rdSearchClear');
  const countEl  = document.getElementById('rdCount');
  const emptyEl  = document.getElementById('rdEmpty');
  function applyFilter() {
    const q = searchEl.value.trim().toLowerCase();
    clearEl.classList.toggle('show', q.length > 0);
    let visible = 0;
    document.querySelectorAll('#rdRoot .rd-row:not(.rd-row--head)').forEach(function(row){
      const hay = (row.dataset.token + ' ' + row.dataset.role + ' ' + row.dataset.px + 'px').toLowerCase();
      const ok = !q || hay.includes(q);
      row.style.display = ok ? '' : 'none';
      if (ok) visible++;
    });
    countEl.textContent = visible;
    emptyEl.classList.toggle('show', visible === 0 && !!q);
  }
  searchEl.addEventListener('input', applyFilter);
  clearEl.addEventListener('click', function(){ searchEl.value = ''; applyFilter(); searchEl.focus(); });
  document.addEventListener('keydown', function(e){
    if (e.key === '/' && document.activeElement !== searchEl) { e.preventDefault(); searchEl.focus(); searchEl.select(); }
  });

  // Sticky pop-out detection
  const toolbarEl = document.getElementById('rdToolbar');
  const sentinel  = document.getElementById('rdToolbarSentinel');
  if ('IntersectionObserver' in window && toolbarEl && sentinel) {
    const obs = new IntersectionObserver(function(entries){
      entries.forEach(function(e){ toolbarEl.classList.toggle('is-stuck', e.intersectionRatio === 0); });
    }, { threshold: [0, 1], rootMargin: '-81px 0px 0px 0px' });
    obs.observe(sentinel);
  }
</script>
</body>
</html>
